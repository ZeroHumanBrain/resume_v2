name: Deploy Vite React App to GitHub Pages

on:
  # 当推送到 main 分支时自动触发（如果是 master 分支，请改成 master）
  push:
    branches: ["main"]

  # 允许在 GitHub 页面上手动点击触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同一时间只有一个部署任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装项目依赖
        run: npm install

      - name: 打包构建项目 (Vite Build)
        run: npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建成果 (dist 目录)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4